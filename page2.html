<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matrix Console</title>
    <style>
        body {
            margin: 0;
            background: black;
            font-family: "Courier New", monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #00ff66;
        }

        .frame {
            width: 80%;
            height: 80%;
            border: 2px solid #00ff66;
            box-shadow: 0 0 8px #00ff66, inset 0 0 8px #00ff66;
            display: flex;
        }

        .left {
            width: 50%;
            padding: 35px;
            box-sizing: border-box;
        }

        .right {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .title {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 20px;
            margin-bottom: 25px;
        }

        /* textarea для ввода */
        textarea {
            width: 100%;
            height: 200px;
            background: black;
            color: #00ff66;
            border: 2px solid #00ff66;
            font-family: inherit;
            font-size: 18px;
            padding: 10px;
            box-sizing: border-box;
            outline: none;
            caret-color: transparent; /* прячем стандартный курсор */
            white-space: pre-wrap;
            overflow: auto;
            position: relative;
        }

        /* мигающий прямоугольник курсора */
        .cursor {
            position: absolute;
            width: 10px;
            height: 1.2em;
            background: #00ff66;
            animation: blink 0.6s step-start infinite;
        }

        @keyframes blink {
            0%,50% {
                opacity: 1;
            }

            51%,100% {
                opacity: 0;
            }
        }

        button {
            margin-top: 15px;
            background: black;
            color: #00ff66;
            border: 2px solid #00ff66;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
        }

            button:hover {
                background: #001a00;
            }

        .right img {
            max-width: 70%;
        }
    </style>
</head>
<body>

    <div class="frame">

        <div class="left">
            <div class="title">welcome, dear dogGg</div>
            <div class="subtitle">
                this page soo empty<br>
                u can write what is missing from it:
            </div>

            <form action="https://formspree.io/f/xaqpqzja" method="POST" id="messageForm" style="position:relative;">
                <textarea name="message" id="console" placeholder="write message..."></textarea>
                <span class="cursor" id="cursor"></span>
                <button type="submit">send</button>
            </form>
        </div>

        <div class="right">
            <img src="matrix.gif">
        </div>

    </div>

    <script>
        const textarea = document.getElementById("console");
        const cursor = document.getElementById("cursor");
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:',.<>/?";

        // функция обновления позиции курсора
        function updateCursor() {
            const text = textarea.value;
            const lines = text.split("\n");
            const lastLine = lines[lines.length - 1];
            const col = lastLine.length;
            const row = lines.length - 1;

            const lineHeight = parseInt(window.getComputedStyle(textarea).lineHeight) || 20;
            const charWidth = 10; // примерная ширина символа

            const topPos = textarea.offsetTop + row * lineHeight + 10;
            const leftPos = textarea.offsetLeft + col * charWidth + 10;
            cursor.style.top = topPos + "px";
            cursor.style.left = leftPos + "px";
        }

        // фокус на textarea
        textarea.focus();
        updateCursor();

        // слушаем ввод
        textarea.addEventListener("keydown", async (e) => {
            if (e.key.length === 1) {
                e.preventDefault();
                await typeChar(e.key);
            }
        });

        // быстрый перебор рандомных символов перед буквой
        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
        async function typeChar(char) {
            let iterations = 2 + Math.floor(Math.random() * 2); // быстро
            let current = textarea.value;
            for (let i = 0; i < iterations; i++) {
                textarea.value = current + chars.charAt(Math.floor(Math.random() * chars.length));
                updateCursor();
                await wait(10); // очень быстро
            }
            textarea.value = current + char;
            textarea.scrollTop = textarea.scrollHeight;
            updateCursor();
        }

        // обновляем позицию курсора каждые 50мс (если пользователь выделяет текст)
        setInterval(updateCursor, 50);
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>matrix page</title>
    <style>
        body {
            margin: 0;
            background: black;
            font-family: "Courier New", monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .frame {
            width: 80%;
            height: 80%;
            border: 2px solid #00ff66;
            box-shadow: 0 0 8px #00ff66, inset 0 0 8px #00ff66;
            display: flex;
        }

        /* левая часть */
        .left {
            width: 50%;
            padding: 35px;
            box-sizing: border-box;
            color: #00ff66;
        }

        /* правая часть */
        .right {
            width: 50%;
            border-left: 2px solid #00ff66;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* текст */
        .title {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 20px;
            margin-bottom: 25px;
        }

        /* имитация textarea */
        .console {
            width: 100%;
            min-height: 200px;
            background: black;
            border: 2px solid #00ff66;
            padding: 10px;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 18px;
            white-space: pre-wrap;
            overflow: auto;
        }

        /* кнопка */
        button {
            margin-top: 15px;
            background: black;
            color: #00ff66;
            border: 2px solid #00ff66;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
        }

            button:hover {
                background: #001a00;
            }

        /* курсор */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #00ff66;
            animation: blink 0.6s step-start infinite;
            vertical-align: bottom;
        }

        @keyframes blink {
            0%,50% {
                opacity: 1;
            }

            51%,100% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="frame">

        <div class="left">
            <div class="title">welcome, dear dogGg</div>
            <div class="subtitle">
                this page soo empty<br>
                u can write what is missing from it:
            </div>

            <form action="https://formspree.io/f/xaqpqzja" method="POST">
                <div id="console" class="console" contenteditable="true"></div>
                <input type="hidden" name="message" id="hiddenMessage">
                <button type="submit" onclick="document.getElementById('hiddenMessage').value=document.getElementById('console').innerText;">send</button>
            </form>
        </div>

        <div class="right">
            <img src="matrix.gif" style="max-width:70%;">
        </div>

    </div>

    <script>
        const consoleDiv = document.getElementById("console");
        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:',.<>/?";

        consoleDiv.focus();

        consoleDiv.addEventListener("keypress", async (e) => {
            if (e.key.length === 1) {
                e.preventDefault();
                await typeChar(e.key);
            }
        });

        function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        async function typeChar(char) {
            let iterations = 3 + Math.floor(Math.random() * 3); // меньше итераций → быстрее
            let current = consoleDiv.innerText;
            for (let i = 0; i < iterations; i++) {
                consoleDiv.innerText = current + chars.charAt(Math.floor(Math.random() * chars.length));
                consoleDiv.scrollTop = consoleDiv.scrollHeight;
                await wait(15); // ускорено
            }
            consoleDiv.innerText = current + char; // настоящая буква
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>matrix</title>

    <style>

        body {
            margin: 0;
            background: black;
            color: #00ff66;
            font-family: "Courier New", monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .frame {
            width: 80%;
            height: 80%;
            border: 2px solid #00ff66;
            box-shadow: 0 0 8px #00ff66, inset 0 0 8px #00ff66;
            display: flex;
        }

        /* левая часть */

        .left {
            width: 50%;
            padding: 35px;
            box-sizing: border-box;
        }

        /* правая часть */

        .right {
            width: 50%;
            border-left: 2px solid #00ff66;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* текст */

        .title {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 20px;
            margin-bottom: 25px;
        }

        /* поле */

        textarea {
            width: 100%;
            height: 200px;
            background: black;
            color: #00ff66;
            border: 2px solid #00ff66;
            font-family: inherit;
            font-size: 18px;
            padding: 10px;
            box-sizing: border-box;
            outline: none;
        }

        /* кнопка */

        button {
            margin-top: 15px;
            background: black;
            color: #00ff66;
            border: 2px solid #00ff66;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
        }

            button:hover {
                background: #001a00;
            }

        /* гифка */

        .right img {
            max-width: 70%;
        }
        /* стиль текстового поля */

        textarea {
            width: 600px;
            height: 200px;
            background: black;
            color: #00ff66;
            border: 2px solid #00ff66;
            font-family: inherit;
            font-size: 18px;
            padding: 10px;
            box-sizing: border-box;
            outline: none;
            caret-color: transparent;
            position: relative;
            overflow: auto;
            white-space: pre-wrap;
        }


        .cursor {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: #00ff66;
            animation: blink 0.6s step-start infinite;
            vertical-align: bottom;
        }

        @keyframes blink {
            0%,50% {
                opacity: 1;
            }

            51%,100% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="frame">

        <div class="left">

            <div class="title">
                welcome, dear dogGg
            </div>

            <div class="subtitle">
                this page soo empty<br>
                u can write what is missing from it:
            </div>

            <form action="https://formspree.io/f/xaqpqzja" method="POST">

<textarea name="message" placeholder="write message..."></textarea>

                <button type="submit">send</button>

            </form>

        </div>

        <div class="right">

            <img src="matrix.gif">

        </div>

    </div>
    <script>
        const textarea = document.getElementById("console");
        const cursor = document.createElement("span");
        cursor.className = "cursor";
        cursor.textContent = " ";
        textarea.parentNode.insertBefore(cursor, textarea.nextSibling);

        const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()_+-=[]{}|;:',.<>/?";

        textarea.addEventListener("keydown", async function (e) {
            if (e.key.length === 1) {
                e.preventDefault();
                await typeChar(e.key);
            }
        });

        function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

        async function typeChar(char) {
            let iterations = 5 + Math.floor(Math.random() * 5); // сколько рандомных символов показать
            let current = textarea.value;
            for (let i = 0; i < iterations; i++) {
                textarea.value = current + chars.charAt(Math.floor(Math.random() * chars.length));
                await wait(30); // скорость перебора
            }
            textarea.value = current + char; // нужная буква
            textarea.scrollTop = textarea.scrollHeight; // автопрокрутка вниз
        }
    </script>
<textarea id="console"></textarea>
</body>
</html>

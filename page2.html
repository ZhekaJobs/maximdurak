<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>matrix page</title>

    <style>

        body {
            margin: 0;
            background: black;
            color: #00ff66;
            font-family: "Courier New", monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* рамка */

        .frame {
            width: 80%;
            height: 80%;
            border: 2px solid #00ff66;
            box-shadow: 0 0 8px #00ff66, inset 0 0 8px #00ff66;
            display: flex;
        }

        /* левая часть */

        .left {
            width: 50%;
            padding: 35px;
            box-sizing: border-box;
        }

        /* правая часть */

        .right {
            width: 50%;
            border-left: 2px solid #00ff66;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* текст */

        .title {
            font-size: 40px;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 20px;
            margin-bottom: 25px;
        }

        /* поле */

        textarea {
            width: 100%;
            height: 200px;
            background: black;
            color: #00ff66;
            border: 2px solid #00ff66;
            font-family: inherit;
            font-size: 18px;
            padding: 10px;
            box-sizing: border-box;
            outline: none;
        }

        /* кнопка */

        button {
            margin-top: 15px;
            background: black;
            color: #00ff66;
            border: 2px solid #00ff66;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 16px;
            cursor: pointer;
        }

            button:hover {
                background: #001a00;
            }

        /* гифка */

        .right img {
            max-width: 70%;
        }
        /* стиль текстового поля */

        textarea {
            width: 100%;
            height: 200px;
            background: black;
            color: #00ff66;
            border: 2px solid #00ff66;
            font-family: "Courier New", monospace;
            font-size: 18px;
            padding: 10px;
            box-sizing: border-box;
            outline: none;
            caret-color: #00ff66;
            /* эффект старого монитора */

            text-shadow: 0 0 4px #00ff66;
        }

            /* мигающий курсор */

            textarea:focus {
                animation: crt 1s infinite;
            }

        @keyframes crt {

            0% {
                text-shadow: 0 0 4px #00ff66;
            }

            50% {
                text-shadow: 0 0 8px #00ff66;
            }

            100% {
                text-shadow: 0 0 4px #00ff66;
            }
        }
    </style>
</head>

<body>

    <div class="frame">

        <div class="left">

            <div class="title">
                welcome, dear dogGg
            </div>

            <div class="subtitle">
                this page soo empty<br>
                u can write what is missing from it:
            </div>

            <form action="https://formspree.io/f/xaqpqzja" method="POST">

<textarea name="message" placeholder="write message..."></textarea>

                <button type="submit">send</button>

            </form>

        </div>

        <div class="right">

            <img src="matrix.gif">

        </div>

    </div>
    <script>

        const textarea = document.querySelector("textarea");

        textarea.addEventListener("keydown", function (e) {

            if (e.key.length === 1) {

                e.preventDefault();

                let text = textarea.value;
                let char = e.key;

                let i = 0;

                let interval = setInterval(() => {

                    textarea.value = text + char.slice(0, i + 1);

                    i++;

                    if (i >= char.length) {
                        clearInterval(interval);
                    }

                }, 40);

            }

        });

    </script>
</body>
</html>

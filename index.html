<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <meta http-equiv="refresh" content="8; url=page2.html">

    <title>load</title>

    <style>

        body {
            margin: 0;
            background: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* гифка почти на весь экран */

        .load {
            position: absolute;
            width: 90vmin;
            height: 90vmin;
            object-fit: contain;
            z-index: 1;
        }

        /* слой VHS */

        .vhs {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 300%;
            pointer-events: none;
            z-index: 2;
            background: repeating-linear-gradient( to bottom, rgba(0,255,120,0.05) 0px, rgba(0,255,120,0.05) 1px, transparent 2px, transparent 5px );
            animation: vhsScroll 10s linear infinite;
        }

        /* бесконечное движение */

        @keyframes vhsScroll {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(33.33%);
            }
        }

        /* лёгкое дрожание */

        .vhs::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient( to bottom, rgba(0,255,120,0.08) 0px, rgba(0,255,120,0.08) 1px, transparent 3px, transparent 7px );
            animation: glitch 0.15s infinite;
            mix-blend-mode: screen;
        }

        @keyframes glitch {
            0% {
                transform: translateX(0)
            }

            50% {
                transform: translateX(1px)
            }

            100% {
                transform: translateX(-1px)
            }
        }
    </style>
</head>

<body>

    <img src="load.gif" class="load">

    <div class="vhs"></div>

</body>
</html>

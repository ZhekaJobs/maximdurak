<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>08.03</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: 'Arial Black', sans-serif;
    position: relative;
  }

  img {
    max-width: 40%;
    max-height: 40%;
    border: 3px solid #0ff;
    filter: drop-shadow(0 0 15px #0ff) drop-shadow(0 0 25px #f0f);
  }

  .orbit {
    position: absolute;
    width: 0;
    height: 0;
  }

  .neon-text {
    position: absolute;
    font-size: 2em;
    font-weight: bold;
    text-align: center;
    color: #fff;
    text-shadow: 
      0 0 5px #0ff,
      0 0 10px #0ff,
      0 0 20px #0ff,
      0 0 40px #f0f,
      0 0 80px #f0f;
    animation: flicker 1.5s infinite alternate;
  }

  .line1 { color: #0ff; }
  .line2 { color: #f0f; }
  .line3 { color: #ff0; }

  /* Вращение текста вокруг центра */
  @keyframes spin1 {
    0%   { transform: rotate(0deg) translateX(250px) rotate(0deg); }
    100% { transform: rotate(360deg) translateX(250px) rotate(-360deg); }
  }
  @keyframes spin2 {
    0%   { transform: rotate(360deg) translateX(300px) rotate(-360deg); }
    100% { transform: rotate(0deg) translateX(300px) rotate(360deg); }
  }
  @keyframes spin3 {
    0%   { transform: rotate(180deg) translateX(200px) rotate(-180deg); }
    100% { transform: rotate(540deg) translateX(200px) rotate(-540deg); }
  }

  /* Мерцание неона */
  @keyframes flicker {
    0%,19%,21%,23%,25%,54%,56%,100% { opacity:1; text-shadow:0 0 5px currentColor, 0 0 10px currentColor, 0 0 20px currentColor; }
    20%,22%,24%,55% { opacity:0.4; text-shadow:none; }
  }

  /* VHS / glitch эффект */
  .glitch {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
  }

  .glitch span {
    position: absolute;
    animation: glitchAnim 2s infinite;
  }

  @keyframes glitchAnim {
    0% { transform: translate(0,0); opacity:1; }
    20% { transform: translate(-5px,2px); opacity:0.8; }
    40% { transform: translate(5px,-2px); opacity:0.6; }
    60% { transform: translate(-3px,1px); opacity:0.9; }
    80% { transform: translate(3px,-1px); opacity:0.7; }
    100% { transform: translate(0,0); opacity:1; }
  }

  /* Нижние надписи */
  .bottom-text {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    font-size: 2em;
    font-weight: bold;
    color: #0ff;
    text-shadow:
      0 0 5px #0ff,
      0 0 10px #0ff,
      0 0 20px #0ff,
      0 0 40px #f0f;
    animation: flicker 1.5s infinite alternate;
  }

  .bottom-text span {
    margin: 0 20px;
    color: #ff0;
    text-shadow:
      0 0 5px #ff0,
      0 0 10px #ff0,
      0 0 20px #ff0;
  }

</style>
</head>
<body>
  <img src="image.png" alt="Old Brother Core Image">

  <div class="orbit">
    <div class="neon-text line1" style="animation: spin1 12s linear infinite;">КРЕВЕТКИ</div>
    <div class="neon-text line2" style="animation: spin2 15s linear infinite;">РЕН ТВ</div>
    <div class="neon-text line3" style="animation: spin3 18s linear infinite;">СОЛ ГУДМАН</div>
  </div>

  <div class="glitch">
    <span style="color:#0ff; top:10px; left:50px;">КРЕВЕТКИ</span>
    <span style="color:#f0f; top:20px; left:60px;">РЕН ТВ</span>
    <span style="color:#ff0; top:30px; left:40px;">СОЛ ГУДМАН</span>
  </div>

  <div class="bottom-text">
    <span>Лиговка</span>
    <span>08.03</span>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>цикада</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #000;
    overflow: hidden;
    font-family: 'Arial Black', sans-serif;
  }


  img {
    max-width: 80%;
    max-height: 40%;
    margin-bottom: 50px;
    border: 3px solid #0ff;
    filter: drop-shadow(0 0 10px #0ff);
  }

  .neon-text {
    font-size: 2em;
    font-weight: bold;
    text-align: center;
    color: #fff;
    text-shadow: 
      0 0 5px #0ff,
      0 0 10px #0ff,
      0 0 20px #0ff,
      0 0 40px #f0f,
      0 0 80px #f0f;
    animation: spin 5s linear infinite;
    margin: 10px 0;
  }

  .line1 { color: #0ff; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff; }
  .line2 { color: #f0f; text-shadow: 0 0 10px #f0f, 0 0 20px #f0f; }
  .line3 { color: #ff0; text-shadow: 0 0 10px #ff0, 0 0 20px #ff0; }

  @keyframes spin {
    0% { transform: rotate(0deg) scale(1); }
    25% { transform: rotate(15deg) scale(1.05); }
    50% { transform: rotate(-15deg) scale(0.95); }
    75% { transform: rotate(10deg) scale(1.02); }
    100% { transform: rotate(0deg) scale(1); }
  }
</style>
</head>
<body>
  <img src="image.png" alt="Old Brother Core Image">
  <div class="neon-text line1">КРЕВЕТКИ</div>
  <div class="neon-text line2">РЕН ТВ</div>
  <div class="neon-text line3">СОЛ ГУДМАН</div>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <meta http-equiv="refresh" content="8; url=page2.html">

    <title>load</title>

    <style>

        body {
            margin: 0;
            background: black;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .load {
            position: relative;
            z-index: 2;
            width: 300px;
            height: 300px;
            object-fit: contain;
        }


        .vhs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            background: repeating-linear-gradient( to bottom, rgba(0,255,120,0.15) 0px, rgba(0,255,120,0.15) 1px, transparent 2px, transparent 6px );
            animation: vhsMove 6s linear infinite;
        }


        @keyframes vhsMove {
            0% {
                transform: translateY(-100px);
            }

            100% {
                transform: translateY(100px);
            }
        }

        .vhs::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient( to bottom, rgba(0,255,120,0.25) 0px, rgba(0,255,120,0.25) 1px, transparent 3px, transparent 8px );
            mix-blend-mode: screen;
            animation: glitch 0.2s infinite;
        }

        @keyframes glitch {
            0% {
                transform: translateX(0);
            }

            50% {
                transform: translateX(1px);
            }

            100% {
                transform: translateX(-1px);
            }
        }
    </style>
</head>

<body>

    <img src="load.gif" class="load">

    <div class="vhs"></div>

</body>
</html>
